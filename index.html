<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Play Doom with JS-DOS</title>
<!-- Load js-dos-api.js from your GitHub repo via jsDelivr CDN -->
<script src="https://nunya-bidness.github.io/doom/js-dos-api.js"></script>
</head>
<body>
<div id="doomContainer" style="width:1024px; height:768px; margin: auto;"></div>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var dosbox = new Dosbox({
      id: "doomContainer",
      onload: function(dos) {
        // Replace with your actual ZIP URL if different
        dos.run(
          "https://nunya-bidness.github.io/doom/DOOM-@evilution.zip",
          "DOOM.EXE"
        );
      }
    });
  });
</script>
</body>
</html>
