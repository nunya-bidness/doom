<!DOCTYPE html>
<html lang="en-us">
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>DOOM</title>
<meta property="og:title" content='DOOM &middot; js-dos' />
<meta property="og:type" content="game" />
<meta property="og:image" content="https://github.com/nunya-bidness/doom/blob/7a68bf094d54c14e38bdae48b22846a1aab2cd70/DOOM.png" />

<!-- CSS -->
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Sans:400,400italic,700|Abril+Fatface" />

<!-- FAVICON -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
<link rel="icon" type="image/png" href="favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />

<!-- JS-DOS API -->
<script src="https://github.com/nunya-bidness/doom/raw/refs/heads/main/js-dos-api.js"></script>
</head>
<body style="background-color:#121212; color: white;">
<style>
  #DOOM { width: 1366px; height: 768px; margin: auto; }
  /* Additional styles if needed */
</style>
<center>
<h1>Play DOOM via JS-DOS</h1>
<h3><a href="https://github.com/thedoggybrad/doom_on_js-dos/blob/main/MANUAL.MD">User Manual</a></h3>
<div style="margin-top:20px;" id="DOOM" class="dosbox-default"></div>
<p>
  <a id="fullscreen_DOOM" href="#" class="fa-solid fa-expand"></a>&nbsp;&nbsp;FULLSCREEN
</p>
</center>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var dosbox_DOOM = new Dosbox({
      id: "DOOM",
      onload: function (dosbox) {
        // Replace with your actual ZIP URL
        dosbox.run("https://raw.githubusercontent.com/nunya-bidness/doom/main/DOOM-@evilution.zip", "DOOM.EXE");
      },
      onrun: function (dosbox, app) {
        console.log("App '" + app + "' is run");
      }
    });
  
    document.getElementById("fullscreen_DOOM").addEventListener("click", function(e) {
      e.preventDefault();
      dosbox_DOOM.requestFullScreen();
    });
  });
</script>
</body>
</html>
